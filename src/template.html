<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Guidance HR System v4.0</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #f1f1f1; }
  ::-webkit-scrollbar-thumb { background: #888; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const USERS = {
  'nashif.razzak': {name:'Nashif A. Razzak',role:'CEO',level:100,id:'GG001',color:'#0C447C'},
  'nafees.razzak': {name:'Nafees Razzak',role:'COO',level:100,id:'GG002',color:'#1e40af'},
  'thasbiha.s': {name:'Thasbiha S.',role:'Head of Admissions/HR',level:80,id:'GG003',color:'#7c2d12'},
  'razan.thawus': {name:'Razan Thawus',role:'Head of BD/Visa',level:80,id:'GG006',color:'#9d174d'},
  'umair': {name:'Umair',role:'Sr. Admin Executive',level:60,id:'GG004',color:'#065f46'},
  'mohamed.s': {name:'Mohamed Salih',role:'Comms & Exec Coord',level:60,id:'GG005',color:'#3730a3'},
  'sukaina': {name:'Sukaina',role:'Student Counsellor',level:40,id:'GG007',color:'#4338ca'},
  'binupa': {name:'Binupa',role:'Jr. Counsellor',level:40,id:'GG008',color:'#92400e'},
  'shiran': {name:'Shiran',role:'Graphic Designer',level:40,id:'GG009',color:'#7c3aed'},
};

const MODULES = [
  {id:'dashboard',label:'Dashboard',icon:'fa-home'},
  {id:'attendance',label:'Attendance & To-Do',icon:'fa-clock'},
  {id:'employees',label:'Employees',icon:'fa-users'},
  {id:'leads',label:'Lead Management',icon:'fa-chart-line'},
  {id:'admissions',label:'Admissions',icon:'fa-file-alt'},
  {id:'students',label:'Students',icon:'fa-user-graduate'},
  {id:'visa',label:'Applications & Visa',icon:'fa-plane'},
  {id:'finance',label:'Finance & Commission',icon:'fa-dollar-sign'},
  {id:'daily',label:'Daily Operations',icon:'fa-tasks'},
  {id:'reports',label:'Reports & Analytics',icon:'fa-chart-bar'},
  {id:'redflags',label:'Red Flags & Risks',icon:'fa-flag'},
  {id:'leave',label:'Leave Management',icon:'fa-calendar'},
  {id:'location',label:'Location Tracker',icon:'fa-map-marker-alt'},
  {id:'performance',label:'Performance',icon:'fa-trophy'},
  {id:'training',label:'Training',icon:'fa-book'},
  {id:'comms',label:'Communication',icon:'fa-comments'},
  {id:'docs',label:'Documents',icon:'fa-folder'},
  {id:'skills',label:'Skills Matrix',icon:'fa-star'},
  {id:'analytics',label:'Analytics',icon:'fa-chart-pie'},
  {id:'visa_check',label:'Visa Checklist',icon:'fa-clipboard-check'},
  {id:'email_gov',label:'Email Governance',icon:'fa-envelope'},
  {id:'settings',label:'System Settings',icon:'fa-cog'},
  {id:'auto',label:'Automation Pipeline',icon:'fa-robot',badge:'NEW',badgeColor:'#10b981'},
  {id:'interview',label:'Interview Prep AI',icon:'fa-microphone',badge:'AI',badgeColor:'#8b5cf6'},
  {id:'payment',label:'Payment Tracker',icon:'fa-credit-card',badge:'NEW',badgeColor:'#10b981'},
  {id:'sop',label:'SOP Builder AI',icon:'fa-pen-fancy',badge:'AI',badgeColor:'#8b5cf6'},
  {id:'capture',label:'Lead Capture Portal',icon:'fa-bullseye',badge:'NEW',badgeColor:'#10b981'},
];

function LoginPage({onLogin}) {
  const [un,setUn]=useState('');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const submit=()=>{
    const user=USERS[un.toLowerCase().trim()];
    if(user && pw==='password123'){onLogin(user);}
    else setErr('Invalid username or password');
  };
  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#0C447C,#1e40af)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'white',borderRadius:16,padding:'40px 36px',width:380,boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{width:64,height:64,background:'#0C447C',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px',fontSize:28}}>🎓</div>
          <h1 style={{fontSize:22,fontWeight:800,color:'#0C447C',margin:'0 0 4px'}}>Global Guidance</h1>
          <p style={{color:'#6b7280',fontSize:13,margin:0}}>Education Consultancy HR System v4.0</p>
        </div>
        {err && <p style={{color:'#dc2626',fontSize:12,textAlign:'center',marginBottom:10}}>{err}</p>}
        <input style={{width:'100%',padding:'11px 14px',border:'1px solid #e5e7eb',borderRadius:8,fontSize:14,marginBottom:12,outline:'none'}}
          placeholder="Username" value={un} onChange={e=>setUn(e.target.value)} onKeyPress={e=>e.key==='Enter'&&submit()} />
        <input type="password" style={{width:'100%',padding:'11px 14px',border:'1px solid #e5e7eb',borderRadius:8,fontSize:14,marginBottom:16,outline:'none'}}
          placeholder="Password" value={pw} onChange={e=>setPw(e.target.value)} onKeyPress={e=>e.key==='Enter'&&submit()} />
        <button onClick={submit} style={{width:'100%',padding:'12px',background:'#0C447C',color:'white',border:'none',borderRadius:8,fontSize:15,fontWeight:600,cursor:'pointer'}}>Sign In</button>
        <p style={{textAlign:'center',fontSize:11,color:'#9ca3af',marginTop:16,marginBottom:0}}>All staff password: password123</p>
        <div style={{marginTop:12,padding:'10px',background:'#f9fafb',borderRadius:8,fontSize:11,color:'#6b7280'}}>
          <strong>Staff logins:</strong> nashif.razzak · nafees.razzak · thasbiha.s · razan.thawus · umair · mohamed.s · sukaina · binupa · shiran
        </div>
      </div>
    </div>
  );
}

function Sidebar({user,active,setActive,onLogout}) {
  return (
    <div style={{width:210,background:'#0C447C',color:'white',display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden',flexShrink:0}}>
      <div style={{padding:'14px',borderBottom:'1px solid rgba(255,255,255,.12)'}}>
        <div style={{fontSize:13,fontWeight:700}}>Global Guidance</div>
        <div style={{fontSize:9,color:'#85B7EB',marginTop:1}}>Education Consultancy</div>
      </div>
      <div style={{padding:'8px 10px',background:'rgba(255,255,255,.07)',borderBottom:'1px solid rgba(255,255,255,.1)',display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:30,height:30,borderRadius:'50%',background:user.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>
          {user.name.split(' ').map(w=>w[0]).join('').slice(0,2)}
        </div>
        <div style={{minWidth:0}}>
          <div style={{fontSize:11,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{user.name}</div>
          <div style={{fontSize:9,color:'#85B7EB'}}>{user.role} · {user.id}</div>
        </div>
      </div>
      <nav style={{flex:1,overflowY:'auto',padding:'6px 0'}}>
        {MODULES.map(m=>(
          <div key={m.id} onClick={()=>setActive(m.id)}
            style={{display:'flex',alignItems:'center',gap:7,padding:'6px 12px',cursor:'pointer',color:active===m.id?'white':'rgba(255,255,255,.65)',background:active===m.id?'rgba(255,255,255,.12)':'transparent',borderRight:active===m.id?'3px solid #60a5fa':'3px solid transparent',fontSize:11,transition:'all .12s'}}>
            <i className={`fas ${m.icon}`} style={{width:14,textAlign:'center',fontSize:11}}></i>
            <span style={{flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{m.label}</span>
            {m.badge && <span style={{background:m.badgeColor,color:'white',fontSize:8,padding:'1px 4px',borderRadius:6,fontWeight:700}}>{m.badge}</span>}
          </div>
        ))}
      </nav>
      <div style={{padding:'10px 12px',borderTop:'1px solid rgba(255,255,255,.1)'}}>
        <button onClick={onLogout} style={{width:'100%',padding:'7px',background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.2)',color:'white',borderRadius:6,fontSize:11,cursor:'pointer'}}>
          <i className="fas fa-sign-out-alt" style={{marginRight:6}}></i>Sign Out
        </button>
      </div>
    </div>
  );
}

function StatCard({label,value,sub,color}) {
  return (
    <div style={{background:'white',border:'1px solid #e5e7eb',borderRadius:8,padding:'10px 14px'}}>
      <div style={{fontSize:10,color:'#6b7280',marginBottom:4}}>{label}</div>
      <div style={{fontSize:22,fontWeight:700,color:color||'#111'}}>{value}</div>
      {sub && <div style={{fontSize:10,color:'#6b7280',marginTop:2}}>{sub}</div>}
    </div>
  );
}

function Dashboard({user}) {
  const isHigh = user.level >= 80;
  return (
    <div style={{padding:'16px 20px'}}>
      {user.level>=100 && (
        <div style={{background:'linear-gradient(135deg,#312e81,#1e40af)',borderRadius:10,padding:'12px 16px',display:'flex',alignItems:'center',gap:12,marginBottom:14,color:'white'}}>
          <div><div style={{fontSize:13,fontWeight:600}}>🤖 Automation Pipeline — Live</div><div style={{fontSize:10,color:'#a5b4fc',marginTop:1}}>24 leads tracked automatically</div></div>
          <div style={{display:'flex',gap:16,marginLeft:'auto'}}>
            {[['9','Hot leads'],['74','Avg score'],['5','Follow-ups'],['3','Enrolled']].map(([v,l])=>(
              <div key={l} style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:700}}>{v}</div><div style={{fontSize:9,color:'#a5b4fc'}}>{l}</div></div>
            ))}
          </div>
        </div>
      )}
      <h2 style={{fontSize:16,fontWeight:700,marginBottom:14,color:'#111'}}>Welcome back, {user.name.split(' ')[0]}! 👋</h2>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:16}}>
        <StatCard label="Staff present" value="7/9" sub="2 absent today" />
        <StatCard label="Active applications" value="60" sub="12 offers pending" />
        <StatCard label="Revenue (GBP)" value="£48k" sub="+12% this month" color="#16a34a" />
        <StatCard label="Red flags open" value="5" sub="2 high priority" color="#dc2626" />
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div style={{background:'white',border:'1px solid #e5e7eb',borderRadius:8,overflow:'hidden'}}>
          <div style={{padding:'8px 14px',borderBottom:'1px solid #e5e7eb',fontSize:12,fontWeight:600}}>Staff attendance today</div>
          <div style={{padding:'8px 14px'}}>
            {['Thasbiha S.','Umair','Razan T.','Sukaina','Mohamed S.','Binupa','Shiran'].map(n=>(
              <div key={n} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:'1px solid #f9fafb',fontSize:12}}>
                <span>{n}</span><span style={{background:'#dcfce7',color:'#166534',fontSize:10,padding:'1px 7px',borderRadius:10,fontWeight:600}}>Present</span>
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:12}}>
              <span style={{color:'#dc2626'}}>Nafees Razzak</span><span style={{background:'#fee2e2',color:'#991b1b',fontSize:10,padding:'1px 7px',borderRadius:10,fontWeight:600}}>Absent</span>
            </div>
          </div>
        </div>
        <div>
          <div style={{background:'white',border:'1px solid #e5e7eb',borderRadius:8,overflow:'hidden',marginBottom:10}}>
            <div style={{padding:'8px 14px',borderBottom:'1px solid #e5e7eb',fontSize:12,fontWeight:600}}>Pipeline stages</div>
            <div style={{padding:'10px 14px',display:'flex',gap:4}}>
              {[['New',5,'#f3f4f6','#374151'],['Contacted',4,'#dbeafe','#1e40af'],['Applied',6,'#fef3c7','#92400e'],['Offer',4,'#ede9fe','#5b21b6'],['Visa',3,'#fce7f3','#9d174d'],['Enrolled',2,'#dcfce7','#166534']].map(([l,n,bg,c])=>(
                <div key={l} style={{flex:1,background:bg,color:c,padding:'6px 2px',borderRadius:6,textAlign:'center',fontSize:9,fontWeight:600}}>
                  <div>{l}</div><div style={{fontSize:15,fontWeight:700,margin:'2px 0'}}>{n}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{background:'#fef3c7',border:'1px solid #fde68a',borderRadius:8,padding:'10px 14px',fontSize:11,color:'#92400e'}}>
            ⚠ 3 students pending docs &gt;7 days · 5 new leads auto-scored today
          </div>
        </div>
      </div>
    </div>
  );
}

function ModulePage({module,user}) {
  const titles = {
    leads:'Lead Management Hub', students:'Students', admissions:'Admissions',
    visa:'Applications & Visa', finance:'Finance & Commission', attendance:'Attendance & To-Do',
    employees:'Employees', daily:'Daily Operations', reports:'Reports & Analytics',
    redflags:'Red Flags & Risks', leave:'Leave Management', location:'Location Tracker',
    performance:'Performance', training:'Training', comms:'Communication Suite',
    docs:'Documents', skills:'Skills Matrix', analytics:'Analytics',
    visa_check:'Visa Checklist Engine', email_gov:'Email Governance', settings:'System Settings',
    auto:'Automation Pipeline', interview:'Interview Prep AI', payment:'Payment Tracker',
    sop:'SOP Builder AI', capture:'Lead Capture Portal',
  };
  const badgeModules = ['auto','interview','payment','sop','capture'];
  const isBadge = badgeModules.includes(module);
  return (
    <div style={{padding:'20px'}}>
      <div style={{marginBottom:20,display:'flex',alignItems:'center',gap:10}}>
        <h1 style={{fontSize:18,fontWeight:700,color:'#111',margin:0}}>{titles[module]||module}</h1>
        {isBadge && <span style={{background: module==='interview'||module==='sop'?'#8b5cf6':'#10b981',color:'white',fontSize:10,padding:'2px 8px',borderRadius:10,fontWeight:700}}>
          {module==='interview'||module==='sop'?'AI':'NEW'}
        </span>}
      </div>
      <div style={{background:'white',border:'1px solid #e5e7eb',borderRadius:10,padding:'40px',textAlign:'center',color:'#6b7280'}}>
        <div style={{fontSize:40,marginBottom:12}}>
          {module==='auto'?'🤖':module==='interview'?'🎙':module==='sop'?'✍':module==='payment'?'💳':module==='capture'?'🎯':module==='leads'?'📊':module==='students'?'🎓':module==='visa'?'✈':module==='finance'?'💰':'📋'}
        </div>
        <div style={{fontSize:16,fontWeight:600,color:'#374151',marginBottom:8}}>{titles[module]}</div>
        <div style={{fontSize:13,color:'#9ca3af',maxWidth:400,margin:'0 auto',lineHeight:1.6}}>
          {isBadge ? 
            `This is the ${titles[module]} module. Connect this system to your Cloudflare D1 database or Supabase to enable full data persistence and real-time features.` :
            `This module contains your ${titles[module].toLowerCase()} data. Connect to Cloudflare D1 or Supabase to enable full functionality with persistent storage.`
          }
        </div>
        {isBadge && (
          <div style={{marginTop:20,padding:'12px 16px',background:'#f5f3ff',borderRadius:8,fontSize:12,color:'#5b21b6',border:'1px solid #ede9fe',display:'inline-block'}}>
            ✨ AI-powered features available with backend connection
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [user,setUser] = useState(null);
  const [active,setActive] = useState('dashboard');

  useEffect(()=>{
    try{const u=sessionStorage.getItem('gg_user');if(u)setUser(JSON.parse(u));}catch(e){}
  },[]);

  const login = (u) => { setUser(u); sessionStorage.setItem('gg_user',JSON.stringify(u)); };
  const logout = () => { setUser(null); sessionStorage.removeItem('gg_user'); setActive('dashboard'); };

  if(!user) return <LoginPage onLogin={login} />;

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar user={user} active={active} setActive={setActive} onLogout={logout} />
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{background:'white',borderBottom:'1px solid #e5e7eb',padding:'10px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div>
            <div style={{fontSize:15,fontWeight:700}}>{active==='dashboard'?'Dashboard':MODULES.find(m=>m.id===active)?.label||active}</div>
            <div style={{fontSize:11,color:'#6b7280'}}>Global Guidance HR System v4.0</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{fontSize:11,color:'#6b7280'}}>Logged in as <strong>{user.name}</strong> · Level {user.level}</div>
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',background:'#f8f9fa'}}>
          {active==='dashboard' ? <Dashboard user={user} /> : <ModulePage module={active} user={user} />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
