<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Global Guidance HR System v4.0</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:linear-gradient(135deg,#0C447C,#1e40af);min-height:100vh}
#login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
#login-box{background:white;border-radius:16px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 25px 60px rgba(0,0,0,.3)}
.logo{text-align:center;margin-bottom:24px}
.logo-icon{width:64px;height:64px;background:#0C447C;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:28px}
.logo h1{font-size:22px;font-weight:800;color:#0C447C;margin-bottom:3px}
.logo p{color:#6b7280;font-size:13px}
#err{color:#dc2626;font-size:12px;text-align:center;margin-bottom:8px;min-height:16px;font-weight:500}
.lbl{font-size:11px;font-weight:700;color:#374151;margin-bottom:4px;display:block;letter-spacing:.05em;text-transform:uppercase}
.inp{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;margin-bottom:12px;background:white;color:#111}
.inp:focus{border-color:#0C447C}
.sbtn{width:100%;padding:13px;background:#0C447C;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.sbtn:hover{background:#0a3a6e}
.or{display:flex;align-items:center;gap:10px;margin:16px 0;color:#9ca3af;font-size:11px}
.or::before,.or::after{content:"";flex:1;height:1px;background:#e5e7eb}
.qg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.qb{padding:8px 10px;background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:7px;font-size:11px;cursor:pointer;text-align:left}
.qb:hover{background:#eff6ff;border-color:#0C447C}
.qb .qn{font-weight:700;color:#111;display:block;margin-bottom:1px}
.qb .qr{color:#6b7280;font-size:10px}
#app{display:none;height:100vh;overflow:hidden;flex-direction:row}
#app.show{display:flex}
.sb{width:210px;background:#0C447C;display:flex;flex-direction:column;height:100vh;flex-shrink:0}
.sb-top{padding:12px 13px 8px;border-bottom:1px solid rgba(255,255,255,.12)}
.sb-brand{font-size:13px;font-weight:700;color:white}
.sb-sub{font-size:9px;color:#85B7EB;margin-top:1px}
.sb-user{padding:8px 10px;background:rgba(255,255,255,.07);border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:8px;flex-shrink:0}
.sb-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0}
.sb-nm{font-size:11px;font-weight:600;color:white}
.sb-rl{font-size:9px;color:#85B7EB}
.sb-nav{flex:1;overflow-y:auto;padding:5px 0}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
.ni{display:flex;align-items:center;gap:7px;padding:6px 12px;cursor:pointer;color:rgba(255,255,255,.65);font-size:11px;border-right:3px solid transparent}
.ni:hover{background:rgba(255,255,255,.07);color:white}
.ni.on{background:rgba(255,255,255,.12);color:white;border-right-color:#60a5fa}
.ni i{width:14px;text-align:center;font-size:10px;flex-shrink:0}
.ni span{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nb{font-size:8px;padding:1px 4px;border-radius:4px;font-weight:700;flex-shrink:0}
.sb-foot{padding:9px 12px;border-top:1px solid rgba(255,255,255,.1);flex-shrink:0}
.lo{width:100%;padding:7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;border-radius:6px;font-size:11px;cursor:pointer}
.lo:hover{background:rgba(255,255,255,.18)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tb{background:white;border-bottom:1px solid #e5e7eb;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-t{font-size:15px;font-weight:700;color:#111}
.tb-s{font-size:11px;color:#6b7280;margin-top:1px}
.tb-u{font-size:11px;color:#6b7280}
.con{flex:1;overflow-y:auto;padding:18px 20px;background:#f8f9fa}
.as{background:linear-gradient(135deg,#312e81,#1e40af);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:14px;margin-bottom:16px;color:white}
.an{display:flex;gap:20px;margin-left:auto}
.an-v{font-size:20px;font-weight:700}
.an-l{font-size:9px;color:#a5b4fc}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.sc{background:white;border:1px solid #e5e7eb;border-radius:8px;padding:11px 14px}
.sl{font-size:10px;color:#6b7280;margin-bottom:4px}
.sv{font-size:22px;font-weight:700}
.ss{font-size:10px;color:#6b7280;margin-top:2px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.cd{background:white;border:1px solid #e5e7eb;border-radius:9px;overflow:hidden;margin-bottom:12px}
.ch{padding:9px 14px;border-bottom:1px solid #e5e7eb;font-size:12px;font-weight:600;color:#111}
.cb{padding:10px 14px}
.lr{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f9fafb;font-size:12px}
.lr:last-child{border:none}
.bd{display:inline-flex;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.bg{background:#dcfce7;color:#166534}.br{background:#fee2e2;color:#991b1b}.ba{background:#fef3c7;color:#92400e}.bb{background:#dbeafe;color:#1e40af}.bp{background:#ede9fe;color:#5b21b6}.bgr{background:#f3f4f6;color:#374151}
.pp{display:flex;gap:4px;padding:4px 0}
.ps{flex:1;padding:7px 3px;border-radius:6px;text-align:center;font-size:9px;font-weight:600}
.al{border-radius:7px;padding:8px 11px;font-size:11px;border-left:3px solid;margin-bottom:8px;line-height:1.5}
.alg{background:#dcfce7;color:#166534;border-color:#22c55e}
.ala{background:#fef3c7;color:#92400e;border-color:#f59e0b}
.mp{text-align:center;padding:50px 20px;background:white;border-radius:10px;border:1px solid #e5e7eb}
.mi{font-size:48px;margin-bottom:14px}
.mt{font-size:18px;font-weight:700;color:#374151;margin-bottom:8px}
.md{font-size:13px;color:#9ca3af;max-width:420px;margin:0 auto;line-height:1.7}
@media(max-width:640px){.sg{grid-template-columns:1fr 1fr}.r2{grid-template-columns:1fr}.sb{width:185px}}
</style>
</head>
<body>
<div id="login-wrap">
<div id="login-box">
<div class="logo">
<div class="logo-icon">&#127891;</div>
<h1>Global Guidance</h1>
<p>Education Consultancy HR System v4.0</p>
</div>
<div id="err"></div>
<label class="lbl" for="f-un">USERNAME</label>
<input class="inp" id="f-un" type="text" placeholder="e.g. nashif.razzak" autocomplete="off" spellcheck="false">
<label class="lbl" for="f-pw">PASSWORD</label>
<input class="inp" id="f-pw" type="password" placeholder="password123" autocomplete="off">
<button class="sbtn" onclick="doLogin()">Sign In</button>
<div class="or">or click your name below</div>
<div class="qg" id="qg"></div>
</div>
</div>
<div id="app">
<div class="sb">
<div class="sb-top"><div class="sb-brand">Global Guidance</div><div class="sb-sub">Education Consultancy</div></div>
<div class="sb-user"><div class="sb-av" id="av" style="background:#0C447C">NR</div><div><div class="sb-nm" id="unm">Nashif</div><div class="sb-rl" id="url2">CEO</div></div></div>
<div class="sb-nav" id="nav"></div>
<div class="sb-foot"><button class="lo" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button></div>
</div>
<div class="main">
<div class="tb"><div><div class="tb-t" id="pgt">Dashboard</div><div class="tb-s">Global Guidance HR System v4.0</div></div><div class="tb-u" id="tbu"></div></div>
<div class="con" id="pgc"></div>
</div>
</div>
<script>
var USERS = {
"nashif.razzak":{n:"Nashif A. Razzak",r:"CEO",l:100,id:"GG001",c:"#0C447C",i:"NR"},
"nafees.razzak":{n:"Nafees Razzak",r:"COO",l:100,id:"GG002",c:"#1e40af",i:"NZ"},
"thasbiha.s":{n:"Thasbiha S.",r:"Head of Admissions/HR",l:80,id:"GG003",c:"#7c2d12",i:"TS"},
"razan.thawus":{n:"Razan Thawus",r:"Head of BD/Visa",l:80,id:"GG006",c:"#9d174d",i:"RT"},
"umair":{n:"Umair",r:"Sr. Admin Executive",l:60,id:"GG004",c:"#065f46",i:"UM"},
"mohamed.s":{n:"Mohamed Salih",r:"Comms and Exec Coord",l:60,id:"GG005",c:"#3730a3",i:"MS"},
"sukaina":{n:"Sukaina",r:"Student Counsellor",l:40,id:"GG007",c:"#4338ca",i:"SK"},
"binupa":{n:"Binupa",r:"Jr. Counsellor",l:40,id:"GG008",c:"#92400e",i:"BN"},
"shiran":{n:"Shiran",r:"Graphic Designer",l:40,id:"GG009",c:"#7c3aed",i:"SH"}
};
var MODS = [
{id:"dashboard",lbl:"Dashboard",ic:"fa-home"},
{id:"attendance",lbl:"Attendance & To-Do",ic:"fa-clock"},
{id:"employees",lbl:"Employees",ic:"fa-users"},
{id:"leads",lbl:"Lead Management",ic:"fa-chart-line"},
{id:"admissions",lbl:"Admissions",ic:"fa-file-alt"},
{id:"students",lbl:"Students",ic:"fa-user-graduate"},
{id:"visa",lbl:"Applications & Visa",ic:"fa-plane"},
{id:"finance",lbl:"Finance & Commission",ic:"fa-dollar-sign"},
{id:"daily",lbl:"Daily Operations",ic:"fa-tasks"},
{id:"reports",lbl:"Reports & Analytics",ic:"fa-chart-bar"},
{id:"redflags",lbl:"Red Flags & Risks",ic:"fa-flag"},
{id:"leave",lbl:"Leave Management",ic:"fa-calendar-alt"},
{id:"location",lbl:"Location Tracker",ic:"fa-map-marker-alt"},
{id:"performance",lbl:"Performance",ic:"fa-trophy"},
{id:"training",lbl:"Training",ic:"fa-book"},
{id:"comms",lbl:"Communication Suite",ic:"fa-comments"},
{id:"docs",lbl:"Documents",ic:"fa-folder"},
{id:"skills",lbl:"Skills Matrix",ic:"fa-star"},
{id:"analytics",lbl:"Analytics",ic:"fa-chart-pie"},
{id:"visa_check",lbl:"Visa Checklist",ic:"fa-clipboard-check"},
{id:"email_gov",lbl:"Email Governance",ic:"fa-envelope"},
{id:"settings",lbl:"System Settings",ic:"fa-cog"},
{id:"auto",lbl:"Automation Pipeline",ic:"fa-robot",b:"NEW",bc:"#10b981"},
{id:"interview",lbl:"Interview Prep AI",ic:"fa-microphone",b:"AI",bc:"#8b5cf6"},
{id:"payment",lbl:"Payment Tracker",ic:"fa-credit-card",b:"NEW",bc:"#10b981"},
{id:"sop",lbl:"SOP Builder AI",ic:"fa-pen-fancy",b:"AI",bc:"#8b5cf6"},
{id:"capture",lbl:"Lead Capture Portal",ic:"fa-bullseye",b:"NEW",bc:"#10b981"}
];
var CU = null, CP = "dashboard";

// Build quick login buttons
var qg = document.getElementById("qg");
Object.keys(USERS).forEach(function(k) {
  var u = USERS[k];
  var btn = document.createElement("button");
  btn.className = "qb";
  btn.innerHTML = "<span class=\"qn\">" + u.n.split(" ")[0] + " " + (u.n.split(" ")[1]||"") + "</span><span class=\"qr\">" + u.r + "</span>";
  btn.onclick = function() { quickLogin(k); };
  qg.appendChild(btn);
});

function quickLogin(k) {
  CU = USERS[k];
  try { sessionStorage.setItem("gg", JSON.stringify({k:k,u:CU})); } catch(e) {}
  showApp();
}

function doLogin() {
  var un = document.getElementById("f-un").value.trim().toLowerCase();
  var pw = document.getElementById("f-pw").value;
  var err = document.getElementById("err");
  err.textContent = "";
  if (!un) { err.textContent = "Enter your username"; return; }
  if (!USERS[un]) { err.textContent = "Username not found: " + un; return; }
  if (pw !== "password123") { err.textContent = "Wrong password. Use: password123"; return; }
  quickLogin(un);
}

document.getElementById("f-pw").addEventListener("keypress", function(e) { if (e.key === "Enter") doLogin(); });
document.getElementById("f-un").addEventListener("keypress", function(e) { if (e.key === "Enter") document.getElementById("f-pw").focus(); });

function doLogout() {
  CU = null;
  try { sessionStorage.removeItem("gg"); } catch(e) {}
  document.getElementById("app").classList.remove("show");
  document.getElementById("login-wrap").style.display = "flex";
  document.getElementById("f-un").value = "";
  document.getElementById("f-pw").value = "";
  document.getElementById("err").textContent = "";
}

function showApp() {
  document.getElementById("login-wrap").style.display = "none";
  document.getElementById("app").classList.add("show");
  document.getElementById("av").textContent = CU.i;
  document.getElementById("av").style.background = CU.c;
  document.getElementById("unm").textContent = CU.n;
  document.getElementById("url2").textContent = CU.r + " - " + CU.id;
  document.getElementById("tbu").textContent = CU.n + " | Level " + CU.l;
  buildNav();
  showPage("dashboard");
}

function buildNav() {
  var nav = document.getElementById("nav");
  nav.innerHTML = "";
  MODS.forEach(function(m) {
    var el = document.createElement("div");
    el.className = "ni" + (m.id === CP ? " on" : "");
    var badge = m.b ? ("<span class=\"nb\" style=\"background:" + m.bc + ";color:white\">" + m.b + "</span>") : "";
    el.innerHTML = "<i class=\"fas " + m.ic + "\"></i><span>" + m.lbl + "</span>" + badge;
    el.onclick = (function(mid) { return function() { showPage(mid); }; })(m.id);
    nav.appendChild(el);
  });
}

function showPage(id) {
  CP = id;
  var items = document.querySelectorAll(".ni");
  items.forEach(function(el, i) { el.classList.toggle("on", MODS[i] && MODS[i].id === id); });
  var m = null;
  MODS.forEach(function(x) { if (x.id === id) m = x; });
  document.getElementById("pgt").textContent = m ? m.lbl : id;
  document.getElementById("pgc").innerHTML = id === "dashboard" ? getDash() : getMod(id, m);
}

function getDash() {
  var hi = CU.l >= 100;
  var strip = hi ? "<div class=\"as\"><div><div style=\"font-size:13px;font-weight:600\">Automation Pipeline - Live</div><div style=\"font-size:10px;color:#a5b4fc;margin-top:2px\">24 leads tracked automatically</div></div><div class=\"an\"><div><div class=\"an-v\">9</div><div class=\"an-l\">Hot leads</div></div><div><div class=\"an-v\">74</div><div class=\"an-l\">Avg score</div></div><div><div class=\"an-v\">5</div><div class=\"an-l\">Follow-ups</div></div><div><div class=\"an-v\">3</div><div class=\"an-l\">Enrolled</div></div></div></div>" : "";
  var stats = "<div class=\"sg\"><div class=\"sc\"><div class=\"sl\">Staff present</div><div class=\"sv\">7/9</div><div class=\"ss\">2 absent today</div></div><div class=\"sc\"><div class=\"sl\">Active applications</div><div class=\"sv\">60</div><div class=\"ss\">12 offers pending</div></div><div class=\"sc\"><div class=\"sl\">Revenue (GBP)</div><div class=\"sv\" style=\"color:#16a34a\">GBP48k</div><div class=\"ss\">+12% this month</div></div><div class=\"sc\"><div class=\"sl\">Red flags open</div><div class=\"sv\" style=\"color:#dc2626\">5</div><div class=\"ss\">2 high priority</div></div></div>";
  var staff = ["Thasbiha S.","Umair","Razan T.","Sukaina","Mohamed S.","Binupa","Shiran"].map(function(n) { return "<div class=\"lr\"><span>" + n + "</span><span class=\"bd bg\">Present</span></div>"; }).join("") + "<div class=\"lr\"><span style=\"color:#dc2626\">Nafees Razzak</span><span class=\"bd br\">Absent</span></div>";
  var pipe = [["New",5,"#f3f4f6","#374151"],["Contacted",4,"#dbeafe","#1e40af"],["Applied",6,"#fef3c7","#92400e"],["Offer",4,"#ede9fe","#5b21b6"],["Visa",3,"#fce7f3","#9d174d"],["Enrolled",2,"#dcfce7","#166534"]].map(function(s) { return "<div class=\"ps\" style=\"background:" + s[2] + ";color:" + s[3] + "\">" + s[0] + "<br><strong style=\"font-size:15px\">" + s[1] + "</strong></div>"; }).join("");
  var prio = [["Review Q1 revenue report","br","Urgent"],["Approve 3 pending leave requests","ba","Today"],["Call agent Shree re: commission dispute","br","Urgent"],["Update student application statuses","bgr","Soon"]].map(function(t) { return "<div class=\"lr\"><span>" + t[0] + "</span><span class=\"bd " + t[1] + "\">" + t[2] + "</span></div>"; }).join("");
  return strip + "<h2 style=\"font-size:16px;font-weight:700;margin-bottom:14px\">Welcome back, " + CU.n.split(" ")[0] + "!</h2>" + stats + "<div class=\"r2\"><div class=\"cd\"><div class=\"ch\">Staff attendance today</div><div class=\"cb\">" + staff + "</div></div><div><div class=\"cd\"><div class=\"ch\">Pipeline stages</div><div class=\"cb\"><div class=\"pp\">" + pipe + "</div></div></div><div class=\"al alg\">5 new leads auto-scored today</div><div class=\"al ala\">3 students pending docs over 7 days</div></div></div><div class=\"cd\"><div class=\"ch\">Priorities</div><div class=\"cb\">" + prio + "</div></div>";
}

function getMod(id, m) {
  var ICONS = {leads:"&#128202;",students:"&#127891;",visa:"&#9992;",finance:"&#128176;",attendance:"&#9201;",employees:"&#128101;",daily:"&#9989;",reports:"&#128200;",redflags:"&#128169;",leave:"&#128197;",location:"&#128205;",performance:"&#127942;",training:"&#128218;",comms:"&#128172;",docs:"&#128193;",skills:"&#11088;",analytics:"&#128201;",visa_check:"&#128203;",email_gov:"&#128231;",settings:"&#9881;",auto:"&#129302;",interview:"&#127908;",payment:"&#128179;",sop:"&#9997;",admissions:"&#128196;",capture:"&#127919;"};
  var icon = ICONS[id] || "&#128203;";
  var lbl = m ? m.lbl : id;
  var extra = (m && m.b) ? ("<div style=\"display:inline-block;margin-top:18px;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;background:" + (m.b==="AI"?"#ede9fe":"#dcfce7") + ";color:" + (m.b==="AI"?"#5b21b6":"#166534") + "\">" + (m.b==="AI"?"AI-Powered":"New in v4.0") + "</div>") : "";
  return "<div class=\"mp\"><div class=\"mi\">" + icon + "</div><div class=\"mt\">" + lbl + "</div><div class=\"md\">This module is active. Click any item in the sidebar to navigate between modules.</div>" + extra + "</div>";
}

// Auto-login from session
(function() {
  try {
    var d = JSON.parse(sessionStorage.getItem("gg") || "null");
    if (d && d.u && d.k) { CU = d.u; showApp(); }
  } catch(e) {}
})();
</script>
</body>
</html>
