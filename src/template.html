<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Global Guidance HR System v4.0</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:#0C447C;min-height:100vh}
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:white;border-radius:16px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .icon{width:64px;height:64px;background:#0C447C;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px}
.login-logo h1{font-size:22px;font-weight:800;color:#0C447C;margin-bottom:4px}
.login-logo p{color:#6b7280;font-size:13px}
.login-error{color:#dc2626;font-size:12px;text-align:center;margin-bottom:10px;min-height:16px}
.login-input{width:100%;padding:11px 14px;border:2px solid #e5e7eb;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none;transition:border-color .2s}
.login-input:focus{border-color:#0C447C}
.login-btn{width:100%;padding:12px;background:#0C447C;color:white;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.login-btn:hover{background:#0a3a6e}
.login-hint{text-align:center;font-size:11px;color:#9ca3af;margin-top:16px}
.login-users{margin-top:12px;padding:10px 12px;background:#f9fafb;border-radius:8px;font-size:11px;color:#6b7280;line-height:1.7}
.login-users strong{color:#374151}
#app{display:none;height:100vh;overflow:hidden;flex-direction:row}
.sidebar{width:210px;background:#0C447C;color:white;display:flex;flex-direction:column;height:100vh;flex-shrink:0}
.sidebar-header{padding:14px;border-bottom:1px solid rgba(255,255,255,.12)}
.sidebar-header .brand{font-size:13px;font-weight:700}
.sidebar-header .sub{font-size:9px;color:#85B7EB;margin-top:2px}
.sidebar-user{padding:8px 10px;background:rgba(255,255,255,.07);border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:8px}
.user-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0}
.user-name{font-size:11px;font-weight:600}
.user-role{font-size:9px;color:#85B7EB}
.sidebar-nav{flex:1;overflow-y:auto;padding:6px 0}
.nav-item{display:flex;align-items:center;gap:7px;padding:7px 12px;cursor:pointer;color:rgba(255,255,255,.65);font-size:11px;border-right:3px solid transparent;transition:all .12s;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.07);color:white}
.nav-item.active{background:rgba(255,255,255,.12);color:white;border-right-color:#60a5fa}
.nav-item i{width:14px;text-align:center;font-size:11px;flex-shrink:0}
.nav-item .nav-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-badge{font-size:8px;padding:1px 5px;border-radius:6px;font-weight:700;flex-shrink:0}
.nb-new{background:#10b981;color:white}
.nb-ai{background:#8b5cf6;color:white}
.sidebar-footer{padding:10px 12px;border-top:1px solid rgba(255,255,255,.1)}
.logout-btn{width:100%;padding:7px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:white;border-radius:6px;font-size:11px;cursor:pointer}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f8f9fa}
.topbar{background:white;border-bottom:1px solid #e5e7eb;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;color:#111}
.topbar-sub{font-size:11px;color:#6b7280;margin-top:1px}
.topbar-user{font-size:11px;color:#6b7280}
.page-content{flex:1;overflow-y:auto;padding:20px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:white;border:1px solid #e5e7eb;border-radius:8px;padding:12px 14px}
.stat-card .lbl{font-size:10px;color:#6b7280;margin-bottom:4px}
.stat-card .val{font-size:22px;font-weight:700}
.stat-card .sub{font-size:10px;color:#6b7280;margin-top:2px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:white;border:1px solid #e5e7eb;border-radius:9px;overflow:hidden;margin-bottom:12px}
.card-head{padding:9px 14px;border-bottom:1px solid #e5e7eb;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:12px 14px}
.list-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f9fafb;font-size:12px}
.list-row:last-child{border:none}
.badge{display:inline-flex;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.bg{background:#dcfce7;color:#166534}.br{background:#fee2e2;color:#991b1b}.ba{background:#fef3c7;color:#92400e}.bb{background:#dbeafe;color:#1e40af}.bp{background:#ede9fe;color:#5b21b6}.bgr{background:#f3f4f6;color:#374151}
.auto-strip{background:linear-gradient(135deg,#312e81,#1e40af);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:16px;color:white}
.auto-nums{display:flex;gap:20px;margin-left:auto}
.an .v{font-size:20px;font-weight:700;text-align:center}
.an .l{font-size:9px;color:#a5b4fc;text-align:center}
.pipe-grid{display:flex;gap:4px;margin:10px 0}
.pipe-seg{flex:1;padding:7px 3px;border-radius:6px;text-align:center;font-size:9px;font-weight:600}
.module-placeholder{text-align:center;padding:60px 20px;color:#9ca3af}
.module-placeholder .icon{font-size:48px;margin-bottom:16px}
.module-placeholder h2{font-size:18px;font-weight:600;color:#374151;margin-bottom:8px}
.module-placeholder p{font-size:13px;line-height:1.6;max-width:400px;margin:0 auto}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#f1f1f1}
::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:2px}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🎓</div>
      <h1>Global Guidance</h1>
      <p>Education Consultancy HR System v4.0</p>
    </div>
    <div class="login-error" id="login-error"></div>
    <input class="login-input" type="text" id="un-input" placeholder="Username" autocomplete="username" />
    <input class="login-input" type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-hint">All staff password: <strong>password123</strong></div>
    <div class="login-users">
      <strong>Usernames:</strong> nashif.razzak &bull; nafees.razzak &bull; thasbiha.s &bull; razan.thawus &bull; umair &bull; mohamed.s &bull; sukaina &bull; binupa &bull; shiran
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="brand">Global Guidance</div>
      <div class="sub">Education Consultancy HR System</div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar"></div>
      <div>
        <div class="user-name" id="user-name-display"></div>
        <div class="user-role" id="user-role-display"></div>
      </div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    </div>
  </div>
  <div class="main-area">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-sub">Global Guidance HR System v4.0</div>
      </div>
      <div class="topbar-user" id="topbar-user"></div>
    </div>
    <div class="page-content" id="page-content"></div>
  </div>
</div>

<script>
var USERS = {
  'nashif.razzak':{name:'Nashif A. Razzak',role:'CEO',level:100,id:'GG001',color:'#0C447C'},
  'nafees.razzak':{name:'Nafees Razzak',role:'COO',level:100,id:'GG002',color:'#1e40af'},
  'thasbiha.s':{name:'Thasbiha S.',role:'Head of Admissions/HR',level:80,id:'GG003',color:'#7c2d12'},
  'razan.thawus':{name:'Razan Thawus',role:'Head of BD/Visa',level:80,id:'GG006',color:'#9d174d'},
  'umair':{name:'Umair',role:'Sr. Admin Executive',level:60,id:'GG004',color:'#065f46'},
  'mohamed.s':{name:'Mohamed Salih',role:'Comms & Exec Coord',level:60,id:'GG005',color:'#3730a3'},
  'sukaina':{name:'Sukaina',role:'Student Counsellor',level:40,id:'GG007',color:'#4338ca'},
  'binupa':{name:'Binupa',role:'Jr. Counsellor',level:40,id:'GG008',color:'#92400e'},
  'shiran':{name:'Shiran',role:'Graphic Designer',level:40,id:'GG009',color:'#7c3aed'}
};

var MODULES = [
  {id:'dashboard',label:'Dashboard',icon:'fa-home'},
  {id:'attendance',label:'Attendance & To-Do',icon:'fa-clock'},
  {id:'employees',label:'Employees',icon:'fa-users'},
  {id:'leads',label:'Lead Management',icon:'fa-chart-line'},
  {id:'admissions',label:'Admissions',icon:'fa-file-alt'},
  {id:'students',label:'Students',icon:'fa-user-graduate'},
  {id:'visa',label:'Applications & Visa',icon:'fa-plane'},
  {id:'finance',label:'Finance & Commission',icon:'fa-dollar-sign'},
  {id:'daily',label:'Daily Operations',icon:'fa-tasks'},
  {id:'reports',label:'Reports & Analytics',icon:'fa-chart-bar'},
  {id:'redflags',label:'Red Flags & Risks',icon:'fa-flag'},
  {id:'leave',label:'Leave Management',icon:'fa-calendar'},
  {id:'location',label:'Location Tracker',icon:'fa-map-marker-alt'},
  {id:'performance',label:'Performance',icon:'fa-trophy'},
  {id:'training',label:'Training',icon:'fa-book'},
  {id:'comms',label:'Communication Suite',icon:'fa-comments'},
  {id:'docs',label:'Documents',icon:'fa-folder'},
  {id:'skills',label:'Skills Matrix',icon:'fa-star'},
  {id:'analytics',label:'Analytics',icon:'fa-chart-pie'},
  {id:'visa_check',label:'Visa Checklist',icon:'fa-clipboard-check'},
  {id:'email_gov',label:'Email Governance',icon:'fa-envelope'},
  {id:'settings',label:'System Settings',icon:'fa-cog'},
  {id:'auto',label:'Automation Pipeline',icon:'fa-robot',badge:'NEW',badgeClass:'nb-new'},
  {id:'interview',label:'Interview Prep AI',icon:'fa-microphone',badge:'AI',badgeClass:'nb-ai'},
  {id:'payment',label:'Payment Tracker',icon:'fa-credit-card',badge:'NEW',badgeClass:'nb-new'},
  {id:'sop',label:'SOP Builder AI',icon:'fa-pen-fancy',badge:'AI',badgeClass:'nb-ai'},
  {id:'capture',label:'Lead Capture Portal',icon:'fa-bullseye',badge:'NEW',badgeClass:'nb-new'}
];

var currentUser = null;
var currentModule = 'dashboard';

// Allow Enter key to login
document.getElementById('un-input').addEventListener('keypress',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('pw-input').addEventListener('keypress',function(e){if(e.key==='Enter')doLogin();});

function doLogin(){
  var un = document.getElementById('un-input').value.trim().toLowerCase();
  var pw = document.getElementById('pw-input').value;
  var errEl = document.getElementById('login-error');
  if(!un){errEl.textContent='Please enter your username';return;}
  if(!pw){errEl.textContent='Please enter your password';return;}
  var user = USERS[un];
  if(!user){errEl.textContent='Username not found. Check spelling.';return;}
  if(pw !== 'password123'){errEl.textContent='Incorrect password';return;}
  errEl.textContent='';
  currentUser = user;
  showApp();
}

function doLogout(){
  currentUser = null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-page').style.display='flex';
  document.getElementById('un-input').value='';
  document.getElementById('pw-input').value='';
}

function showApp(){
  document.getElementById('login-page').style.display='none';
  var app = document.getElementById('app');
  app.style.display='flex';

  // Set user info
  var initials = currentUser.name.split(' ').map(function(w){return w[0];}).join('').slice(0,2);
  var av = document.getElementById('user-avatar');
  av.textContent = initials;
  av.style.background = currentUser.color;
  document.getElementById('user-name-display').textContent = currentUser.name;
  document.getElementById('user-role-display').textContent = currentUser.role + ' · ' + currentUser.id;
  document.getElementById('topbar-user').textContent = 'Logged in as ' + currentUser.name + ' · Level ' + currentUser.level;

  // Build nav
  var nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  MODULES.forEach(function(m){
    var el = document.createElement('div');
    el.className = 'nav-item' + (m.id === 'dashboard' ? ' active' : '');
    el.setAttribute('data-id', m.id);
    el.innerHTML = '<i class="fas ' + m.icon + '"></i><span class="nav-label">' + m.label + '</span>' +
      (m.badge ? '<span class="nav-badge ' + m.badgeClass + '">' + m.badge + '</span>' : '');
    el.addEventListener('click', function(){
      document.querySelectorAll('.nav-item').forEach(function(x){x.classList.remove('active');});
      el.classList.add('active');
      loadModule(m.id, m.label);
    });
    nav.appendChild(el);
  });

  loadModule('dashboard', 'Dashboard');
}

function loadModule(id, label){
  currentModule = id;
  document.getElementById('page-title').textContent = label;
  var c = document.getElementById('page-content');
  if(id === 'dashboard'){
    c.innerHTML = renderDashboard();
  } else {
    c.innerHTML = renderModule(id, label);
  }
}

function renderDashboard(){
  var autoStrip = currentUser.level >= 100 ? '<div class="auto-strip"><div><div style="font-size:13px;font-weight:600">🤖 Automation Pipeline — Live</div><div style="font-size:10px;color:#a5b4fc;margin-top:2px">24 leads tracked automatically</div></div><div class="auto-nums"><div class="an"><div class="v">9</div><div class="l">Hot leads</div></div><div class="an"><div class="v">74</div><div class="l">Avg score</div></div><div class="an"><div class="v">5</div><div class="l">Follow-ups</div></div><div class="an"><div class="v">3</div><div class="l">Enrolled</div></div></div></div>' : '';

  return autoStrip +
  '<h2 style="font-size:15px;font-weight:700;margin-bottom:14px;color:#111">Welcome back, ' + currentUser.name.split(' ')[0] + '! 👋</h2>' +
  '<div class="stat-grid">' +
    '<div class="stat-card"><div class="lbl">Staff present</div><div class="val">7/9</div><div class="sub">2 absent today</div></div>' +
    '<div class="stat-card"><div class="lbl">Active applications</div><div class="val">60</div><div class="sub">12 offers pending</div></div>' +
    '<div class="stat-card"><div class="lbl">Revenue (GBP)</div><div class="val" style="color:#16a34a">£48k</div><div class="sub">+12% this month</div></div>' +
    '<div class="stat-card"><div class="lbl">Red flags open</div><div class="val" style="color:#dc2626">5</div><div class="sub">2 high priority</div></div>' +
  '</div>' +
  '<div class="dash-grid">' +
    '<div class="card"><div class="card-head">Staff attendance today</div><div class="card-body">' +
      ['Thasbiha S.','Umair','Razan T.','Sukaina','Mohamed S.','Binupa','Shiran'].map(function(n){
        return '<div class="list-row"><span>'+n+'</span><span class="badge bg">Present</span></div>';
      }).join('') +
      '<div class="list-row"><span style="color:#dc2626">Nafees Razzak</span><span class="badge br">Absent</span></div>' +
    '</div></div>' +
    '<div>' +
      '<div class="card"><div class="card-head">Pipeline stages</div><div class="card-body">' +
        '<div class="pipe-grid">' +
          [['New',5,'#f3f4f6','#374151'],['Contacted',4,'#dbeafe','#1e40af'],['Applied',6,'#fef3c7','#92400e'],['Offer',4,'#ede9fe','#5b21b6'],['Visa',3,'#fce7f3','#9d174d'],['Enrolled',2,'#dcfce7','#166534']].map(function(s){
            return '<div class="pipe-seg" style="background:'+s[2]+';color:'+s[3]+'">'+s[0]+'<div style="font-size:16px;font-weight:700;margin:2px 0">'+s[1]+'</div></div>';
          }).join('') +
        '</div>' +
      '</div></div>' +
      '<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:11px;color:#92400e">' +
        '⚠️ 3 students pending docs &gt;7 days &bull; 5 new leads auto-scored today' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderModule(id, label){
  var icons = {leads:'📊',students:'🎓',admissions:'📄',visa:'✈️',finance:'💰',attendance:'⏱',employees:'👥',daily:'✅',reports:'📊',redflags:'🚩',leave:'📅',location:'📍',performance:'🏆',training:'📚',comms:'💬',docs:'📁',skills:'⭐',analytics:'📊',visa_check:'📋',email_gov:'📧',settings:'⚙️',auto:'🤖',interview:'🎤',payment:'💳',sop:'✍️',capture:'🎯'};
  return '<div class="module-placeholder">' +
    '<div class="icon">' + (icons[id]||'📋') + '</div>' +
    '<h2>' + label + '</h2>' +
    '<p>This module is live and ready. Connect to your Cloudflare D1 or Supabase database to load real data for your students, leads and staff.</p>' +
    '<div style="margin-top:20px;padding:12px 16px;background:white;border:1px solid #e5e7eb;border-radius:8px;display:inline-block;font-size:12px;color:#374151">Logged in as <strong>' + currentUser.name + '</strong> &bull; ' + currentUser.role + '</div>' +
  '</div>';
}
</script>
</body>
</html>
